name: Workflow Tag Builder

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run script
        run: python helpers/tag-builder.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/submission/assets/search_terms.yml
          git diff --staged --quiet || git commit -m "chore: update search_terms.yml"
          git push